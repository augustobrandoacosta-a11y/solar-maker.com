<!DOCTYPE html>
<html>
<body>
  <div id="menu" class="screen">
    <h1>Welcome to Solar Maker</h1>
    <button onclick="showScreen('planet-studio')">Make Planet</button>
    <button onclick="showScreen('system-studio')">Make System</button>
  </div>

  <div id="planet-studio" class="screen" style="display:none;">
    <h1>Planet Studio</h1>
    <p>Draw your planet here!</p>
    <button onclick="showScreen('menu')">Back to Menu</button>
  </div>

  <div id="system-studio" class="screen" style="display:none;">
    <h1>System Studio</h1>
    <p>Add planets to your system!</p>
    <button onclick="showScreen('menu')">Back to Menu</button>
  </div>
</body>
</html>
